<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Fundo cream sutil (igual --background light do site) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFAF7"/>
      <stop offset="1" stop-color="#F4F1EA"/>
    </linearGradient>
    <!-- Glow leve em slate-blue (--primary do site) -->
    <radialGradient id="glow" cx="0.95" cy="0.05" r="0.55">
      <stop offset="0" stop-color="#3F5BA6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#3F5BA6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="1.0" r="0.45">
      <stop offset="0" stop-color="#3F5BA6" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3F5BA6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Borda sutil interior (sensação editorial de "carta") -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#E8E4DA" stroke-width="1" rx="8"/>

  <!-- Badge "Disponível para projetos" — bg-secondary/80 + dot verde -->
  <g transform="translate(80, 95)">
    <rect x="0" y="0" width="240" height="36" rx="18" fill="#F0EDE6"/>
    <circle cx="22" cy="18" r="5" fill="#22C55E"/>
    <text x="38" y="23" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#5C6675" letter-spacing="0.1">
      Disponível para projetos
    </text>
  </g>

  <!-- Nome (h1 do hero) -->
  <g transform="translate(80, 230)">
    <text font-family="Inter, sans-serif" font-size="108" font-weight="500" fill="#1F2229" letter-spacing="-3.2">
      Rafael Nassar
    </text>
    <!-- "Software Engineer" italic serif (mesmo serif accent do site) -->
    <text y="80" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="48" fill="#5C6675" letter-spacing="-0.8">
      Software Engineer
    </text>
  </g>

  <!-- Pitch (mesmo do Hero, em duas linhas) -->
  <g transform="translate(80, 410)">
    <text font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#3D4654" letter-spacing="-0.2">
      Apps web, mobile e SaaS — do zero ou integrando com sistemas legados.
    </text>
    <text y="34" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#7B8593" letter-spacing="-0.1">
      Emissão fiscal · Força de venda · Dashboards · Automações · Delphi · React · Node.js
    </text>
  </g>

  <!-- Logo + URL no canto inferior esquerdo -->
  <g transform="translate(80, 540)">
    <text font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#1F2229" letter-spacing="-0.2">
      <tspan font-family="Instrument Serif, Georgia, serif" font-style="italic" font-weight="400">rafael</tspan><tspan font-weight="600">nassar</tspan><tspan fill="#3F5BA6">.</tspan>
    </text>
  </g>

  <!-- URL no canto inferior direito -->
  <g transform="translate(1120, 540)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#7B8593" letter-spacing="0.4" text-anchor="end">
      RAFAELNASSAR.GITHUB.IO
    </text>
  </g>
</svg>
