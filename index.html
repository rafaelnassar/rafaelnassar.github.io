    <!--
      Fontes self-hosted em /fonts/. Eliminam:
      - Pre-connect/DNS lookup pro fonts.googleapis.com
      - Round-trip extra pro CSS do Google Fonts (~150ms render-blocking)
      - Round-trip pro fonts.gstatic.com pra cada arquivo
      Inter é variable font: 1 arquivo cobre weights 400-700.
      Instrument Serif só italic é usado no site.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/inter-latin.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/instrument-serif-latin-italic.woff2"
    />
    <style>

        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/inter-latin.woff2') format('woff2');

      @font-face {
        font-family: 'Instrument Serif';

    <script>
      (function () {
        try {
          // ?theme=light força light mode antes do React montar — usado pelo
          // script de geração do PDF (scripts/build-cv.mjs) pra garantir que
          // o headless Chrome renderize com fundo claro independente das
          // preferências de sistema. Tem precedência sobre localStorage e
          // prefers-color-scheme.
          var url = new URL(window.location.href);
          if (url.searchParams.get('theme') === 'light') return;

          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>

    <!--
      Analytics: Cloudflare Web Analytics
      - Privacy-first: zero cookies, zero PII, GDPR/LGPD compliant
      - 100% gratuito, sem free trial / sem cap de pageviews
      - Não precisa migrar DNS nem usar CF como CDN — funciona em qualquer site

      Setup (~3 min):
        1. Criar conta gratuita em https://dash.cloudflare.com
        2. Sidebar → Analytics & Logs → Web Analytics → Add a site
        3. Colar https://rafaelnassar.github.io e finalizar
        4. Copiar o "token" mostrado e substituir YOUR_CLOUDFLARE_TOKEN abaixo

      Enquanto o token estiver com o placeholder padrão, o snippet abaixo
      é inerte: não faz nenhum request externo, não polui devtools, não
      impacta CWV. Após substituir, ativa automaticamente.

      Alternativas (se preferir):
        - Plausible (pago $9/mês, dashboard mais bonito):
          <script defer data-domain="rafaelnassar.github.io" src="https://plausible.io/js/script.js"></script>
        - Umami self-hosted ou Umami Cloud (free tier 10k events/mês)
    -->
    <script>
      (function () {
        var token = "YOUR_CLOUDFLARE_TOKEN";
        if (!token || token === "YOUR_CLOUDFLARE_TOKEN") return;
        var s = document.createElement("script");
        s.defer = true;
        s.src = "https://static.cloudflareinsights.com/beacon.min.js";
        s.setAttribute("data-cf-beacon", JSON.stringify({ token: token }));
        document.head.appendChild(s);
      })();
    </script>
