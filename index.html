    <!--
      Fontes self-hosted em /fonts/. Eliminam:
      - Pre-connect/DNS lookup pro fonts.googleapis.com
      - Round-trip extra pro CSS do Google Fonts (~150ms render-blocking)
      - Round-trip pro fonts.gstatic.com pra cada arquivo
      Inter é variable font: 1 arquivo cobre weights 400-700.
      Instrument Serif só italic é usado no site.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/inter-latin.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/instrument-serif-latin-italic.woff2"
    />
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/inter-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Instrument Serif';
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/instrument-serif-latin-italic.woff2') format('woff2');
      }
    </style>

    <script>
      (function () {
        try {
          // ?theme=light força light mode antes do React montar — usado pelo
          // script de geração do PDF (scripts/build-cv.mjs) pra garantir que
          // o headless Chrome renderize com fundo claro independente das
          // preferências de sistema. Tem precedência sobre localStorage e
          // prefers-color-scheme.
          var url = new URL(window.location.href);
          if (url.searchParams.get('theme') === 'light') return;

          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
